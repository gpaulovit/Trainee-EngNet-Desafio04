name: Deploy Docsify to GitHub Pages

on:
  push:
    branches:
      - main 
    paths:
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v4

      - name: Fazer o upload do artefato (Sua pasta docs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Fazer o Deploy
        id: deployment
        uses: actions/deploy-pages@v4